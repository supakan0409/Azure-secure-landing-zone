name: Secure Landing Zone Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  # Job 1: Infrastructure Security Audit (SAST)
  security-audit:
    name: Security Scan (Checkov)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Security Tools
        run: |
          pip install checkov

      - name: Run Static Code Analysis
        # Scans Bicep files for misconfigurations.
        # --soft-fail: Continues pipeline execution even if risks are found (useful for learning/demo).
        # Remove --soft-fail in production to enforce strict security gates.
        run: checkov -d . --framework bicep --soft-fail

  # Job 2: Syntax Validation & Build
  infrastructure-validation:
    name: Bicep Build Validation
    runs-on: ubuntu-latest
    needs: security-audit # dependency: only run if audit finishes
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v3

      - name: Install Azure CLI
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Validate Bicep Syntax
        # Compiles Bicep to ARM Template to ensure syntax correctness.
        run: az bicep build --file main.bicep